body:
  text: 存三星中紫光玉色洞照無極星辰萬物渾然爲一思二星大如赤日紫芒八逹左輔垂光中有嬰兒首建天晨寳冠紫繡華衣乘氣縱來臨兆面前叩齒九通陰呼左輔神宫玉皇尊神金闕後聖太平帝君心思字二過呪曰帝星元精後聖之堂太平帝君上清之王主校萬眞微呼陰陽賜臣道訣丐臣妙方天纓玉衣首建玄光下副願誠得棲紫房右弼神宫丹瑶玉房玉皇尊神太微玉帝君形服同前叩齒陰呼心思字三過呪曰尊聖太微總統樞機弼佐玄常萬靈散開流精泥丸鍊凝百骸解胞斬根七祖仙飛尸結斷絶錫臣羽儀衮衣繡裳永劫同歸思輔弼帝眞在兆左右浮立光中髙過頭上次思華蓋下玉宸尊星紫炁流光下注二帝及兆身内仰見玉帝无極寳冠紅錦玉衣形如嬰兒手執玉璽九色圎光照徹天地叩齒陰呼玉京金闕至聖至眞玉宸紫宫玉皇上帝心思器字三過呪曰萬劫開闔玉帝之尊龍衣鳯璽罔敢不臣極眞无名上聖自然下接小兆三景浮軿與帝同輦玉宸之天抜臣生死開濟九玄帝思臣心无有後先飛形玉清指揮天元思三帝携兆起浮行九色光空之中即見寳五翠霞八景之輿駕御九龍與兆同升侍帝車中億乗萬騎直造上奔玉宸之中因以忘形勤之五年後聖降眞七年同御玉宸游聘萬天太上道君曰三炁未分混沌无像寄在杳冥不可意知一虚空矣空以虚靜靜極則明明非從生不知由然所謂明者今知覺玄明以立體暗相奪焉明勝爲陽暗勝爲陰蒸則爲水緩則爲土結則爲金急則爲火涌則爲木散爲萬物流爲變化凝爲區域天地百寳即汝所能自有汝者所爲也動類通其情人畜各有知靜類通其形萬物各有像動靜未嘗離人物相體用故生有性性能知本无知因謂之知形返性常不終不始天地萬物類也各以根種受其无性人畜殊木石異五味不易於古一炁常化於今聖人通道故不行而至不見而明衆人昩於道故遷流不返以眞爲賊不知乎萬物一物天人一炁但以結形固根分明而居道无生死析薪散明譬之植榖一以滋萬今歳之榖非前歳之穀而未始非穀人物亦然今人之目視古人之目視能視而已非古之視來今人之目也其種堅其類定氣味不相踰而其明常所謂明常蓋明體本明非一明而不易也是以衆人有憶忘死生凡聖懸隔至理彰矣變化見矣能得其眞而忘其情屢死生而不易其已性則造化爲我得矣雖然與天地俱矣安所逃哉及乎與道同體人畜物我福禍无復議也聖絶於道域眞極於神郷以希夷而無竸與至德而同光知吾言三奔之道舉則成矣以傳有眞人之玄挺者脆用丹玉之環三玄雲之錦一盟如上清之科大上道君曰他道所修未及玉帝也至帝而極矣玉帝者天地萬靈父母也今存我始生之眞胎元之神根本復先歸於生初猶可得道況力携天地巧雕衆形役陰陽而行道德唯玉帝三奔爲太上之道五帝流精於明堂之君後聖通洞房之神太微坐金床於玄丹之心上關玉宸太極玉關紫宫之眞上清華晨三奔玉訣
