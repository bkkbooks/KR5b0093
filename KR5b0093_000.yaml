front:
  text: 上清華晨三奔玉訣太上道君曰子欲長生當存九星子欲升真當知玉晨子欲飛騰當勤三奔謂華蓋下北辰斗中輔弼也二儀寄胎萬化未開三辰韞秀三氣氤氲聚晶含光凝為三星列曜不得參其用日月不得干其政三氣玄根萬靈所歸上基三境天聖寶皇之都下布三辰樞紐之柄中為明堂洞房玄丹之真以生三一真人赤子黃庭之神以之死生以之隱淪以之變通以之飛奔以之長存莫不由此也華蓋之下端深明煥者北辰不動之星也是為玉宸玄皇大道君之分精為玉帝之真星也廕華蓋乘斗車游九天賔九聖臣千真居玄臺位玉清輔星即髙上玉皇之神太平金闕後聖帝君之精弼星即太微天帝玉尊之靈輔曰八景弼曰七晨是為帝尊北斗九星之大神上輔玉皇下撫無元萬氣之先行道之者為上清玉帝之真給以豁落七元流金火鈴乘八景之輿上朝玉宸也其道以星出時施席北燒香心九拜平坐接手暝目思三星各出紫光玉色之氣下注兆身如天清霽行雲四歸風煙斂嶽一體同輝莫不周極內徹五臟上游泥丸目曈舌根分假之間紫氣光旋匝繞九重咽氣液三九過叩齒九通陰呪祝曰玉帝髙真三玄仰分左輔右弼中極紫宸液精玄虛洞空九回淘鍊形器金骨緑筋三帝下接合形同奔積翠寶帔靈靈飛裙佩服豁落腰帶流鈐日月俠衛龍虎冀輪八景琅輿建章七晨上極玉景玉帝之臣
